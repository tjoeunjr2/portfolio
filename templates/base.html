<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ profile.name }} — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="cursor"></div>
  <div class="cursor-ring"></div>

  <nav class="nav">
    <a href="/" class="nav-logo">H<span>.</span>G</a>
    <ul class="nav-links">
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#about">About</a></li>
      <li><a href="{{ profile.github }}" target="_blank">GitHub ↗</a></li>
    </ul>
  </nav>

  {% block content %}{% endblock %}

  <footer>
    <span>© 2026 {{ profile.name }}</span>
    <span>Seoul, Korea</span>
    <a href="{{ profile.github }}" style="color:inherit;text-decoration:none;" target="_blank">GitHub</a>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
